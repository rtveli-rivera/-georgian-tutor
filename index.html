<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ქართული — Kartuli Coach</title>
  <meta name="theme-color" content="#b0413e">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍇</text></svg>">
</head>
<body>
  <div id="app">
    <header id="topbar">
      <div class="brand"><span class="brand-ka">ქართული</span> <span class="brand-en">Kartuli Coach</span></div>
      <div id="streak-chip" class="chip" title="Daily streak">🔥 0</div>
    </header>
    <nav id="nav">
      <button data-view="today" class="active">📅 Today</button>
      <button data-view="review">🔁 Review</button>
      <button data-view="practice">🏋️ Practice</button>
      <button data-view="pron">👄 Sounds</button>
      <button data-view="speak">🗣️ Speak</button>
      <button data-view="progress">📈 Progress</button>
      <button data-view="library">📚 Library</button>
      <button data-view="settings">⚙️</button>
    </nav>
    <div id="update-banner" class="banner hidden"></div>
    <div id="tts-banner" class="banner hidden"></div>
    <main id="view"></main>
  </div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
